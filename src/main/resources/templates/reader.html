<!DOCTYPE html>
<html class="reader-bg dark" xmlns:th="http://www.thymeleaf.org">
  <head>
    <div th:with="page='Reader'"></div>
    <th:block th:insert="~{head}"></th:block>
    <style>
      .reader-container {
        background-color: #0e0e11;
      }
    </style>
  </head>

  <body class="bg-surface-container-lowest text-on-surface font-body overflow-hidden">
    <!-- TopNavBar (Consistent Navbar) -->
    <th:block th:insert="~{navbar-top}"></th:block>

    <!-- Reader Canvas (Vertical Webtoon Style) -->
    <main class="reader-canvas h-screen overflow-y-auto pt-16 flex flex-col items-center bg-surface-container-lowest">
      <!-- Images -->
      <div th:each="item : ${items}" class="w-full max-w-4xl">
        <img th:if="${item.type == 'IMG'}" th:src="'/image/' + ${entryid} + '/' + ${item.id}" class="w-full h-auto object-cover" />
        <video th:if="${item.type == 'VIDEO'}" class="w-full h-auto object-cover" controls>
          <source th:src="'/image/' + ${entryid} + '/' + ${item.id}" type="video/mp4">
        </video>
      </div>

      <!-- Chapter End Section -->
      <div class="w-full max-w-4xl py-24 px-6 flex flex-col items-center gap-8 bg-surface">
        <div class="h-[1px] w-32 bg-primary/20"></div>
        <div class="text-center space-y-2">
          <p class="font-headline text-on-surface-variant tracking-[0.2em] text-xs uppercase">End of Chapter</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-center flex-wrap">
          <a th:if="${next_entry_url}" th:href="@{${next_entry_url}}" class="group relative px-10 py-4 bg-primary text-on-primary font-headline font-bold uppercase tracking-widest text-sm rounded-md transition-all hover:pr-14 overflow-hidden">
            <span class="relative z-10">Next Chapter</span>
            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
            <div class="absolute inset-0 bg-primary-container opacity-0 group-hover:opacity-100 transition-opacity"></div>
          </a>
          <a th:href="@{${exit_url}}" class="px-10 py-4 bg-surface-container-high text-on-surface font-headline font-bold rounded-md hover:bg-surface-container-highest transition-colors">
            Back to Library
          </a>
          <!-- Move to Directory Button -->
          <button id="move-btn" class="px-10 py-4 bg-surface-container-high text-on-surface font-headline font-bold rounded-md hover:bg-surface-container-highest transition-colors" onclick="openMoveDialog()">
            Move to Directory
          </button>
          <!-- Delete Button -->
          <button id="delete-btn" class="px-10 py-4 bg-error/20 text-error font-headline font-bold rounded-md hover:bg-error/30 transition-colors" onclick="openDeleteDialog()">
            Delete Chapter
          </button>
        </div>
      </div>
    </main>

    <!-- Delete Confirmation Dialog -->
    <div id="delete-dialog" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" onclick="if(event.target === this) closeDeleteDialog()">
      <div class="bg-surface-container-high rounded-lg p-6 max-w-sm mx-4">
        <h3 class="font-headline text-xl font-bold text-on-surface mb-4">Delete Chapter</h3>
        <p class="text-on-surface-variant mb-6">Are you sure you want to delete this chapter? This action cannot be undone.</p>
        <div class="flex gap-4 justify-end">
          <button onclick="closeDeleteDialog()" class="px-6 py-2 bg-surface-container text-on-surface rounded-md hover:bg-surface-container-highest transition-colors">
            Cancel
          </button>
          <button onclick="confirmDelete()" class="px-6 py-2 bg-error text-on-error rounded-md hover:bg-error/110 transition-colors font-bold">
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Move to Directory Dialog -->
    <div id="move-dialog" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" onclick="if(event.target === this) closeMoveDialog()">
      <div class="bg-surface-container-high rounded-lg p-6 max-w-md mx-4">
        <h3 class="font-headline text-xl font-bold text-on-surface mb-4">Move Chapter</h3>
        <p class="text-on-surface-variant mb-4 text-sm">Select a directory to move this chapter to:</p>
        <select id="directory-select" class="w-full px-4 py-2 bg-surface-container text-on-surface rounded border border-outline-variant mb-6">
          <option value="">Select Directory...</option>
          <option th:each="target : ${moveTargets}" th:value="${target.name}" th:text="${target.name}"></option>
        </select>
        <div class="flex gap-4 justify-end">
          <button onclick="closeMoveDialog()" class="px-6 py-2 bg-surface-container text-on-surface rounded-md hover:bg-surface-container-highest transition-colors">
            Cancel
          </button>
          <button onclick="confirmMove()" class="px-6 py-2 bg-primary text-on-primary rounded-md hover:bg-primary-container transition-colors font-bold">
            Move
          </button>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      setTheme();

      const entryId = [[${entryid}]];
      const deleteUrl = [[${delete_url}]];
      const moveTargets = [[${moveTargets}]];

      function openDeleteDialog() {
        document.getElementById('delete-dialog').classList.remove('hidden');
      }

      function closeDeleteDialog() {
        document.getElementById('delete-dialog').classList.add('hidden');
      }

      function confirmDelete() {
        window.location.href = deleteUrl;
      }

      function openMoveDialog() {
        document.getElementById('move-dialog').classList.remove('hidden');
      }

      function closeMoveDialog() {
        document.getElementById('move-dialog').classList.add('hidden');
      }

      function confirmMove() {
        const selectedDir = document.getElementById('directory-select').value;
        if (!selectedDir) {
          alert('Please select a directory');
          return;
        }

        // Find the target URL by matching the selected directory name
        const target = moveTargets.find(t => t.name === selectedDir);
        if (target) {
          window.location.href = target.url;
        }
      }
    </script>
  </body>
</html>
