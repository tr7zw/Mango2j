<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <th:block th:insert="~{head}"></th:block>
</head>
<body class="bg-surface text-on-surface font-body">
    <th:block th:insert="~{layout}"></th:block>

    <div class="pt-16 px-6 max-w-7xl mx-auto pb-32">
        <h1 class="text-4xl md:text-5xl font-black font-headline tracking-tighter text-on-surface uppercase mb-10" th:text="${mode == 'top' ? 'Top Viewed' : 'Least Viewed'}"></h1>

        <!-- Results Grid -->
        <div th:if="${!chapters.empty}" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-x-6 gap-y-10">
            <div th:each="item : ${chapters}" class="group cursor-pointer">
                <a th:href="'/reader/' + ${item.id}" class="block">
                    <div class="relative aspect-[2/3] rounded-lg overflow-hidden bg-surface-container-low mb-3">
                        <img th:if="${item.thumbnail != null}" th:src="'/thumbnail/' + ${item.id}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div th:if="${item.thumbnail == null}" class="w-full h-full bg-surface-container flex items-center justify-center">
                            <span class="material-symbols-outlined text-on-surface-variant text-4xl">image_not_supported</span>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-between p-4">
                            <span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                            <button type="button" class="p-1.5 bg-primary/80 hover:bg-primary rounded text-on-primary transition-all" th:hx-get="@{/chapter/{id}/info(id=${item.id})}" hx-target="body" hx-swap="beforeend" onclick="event.preventDefault(); event.stopPropagation();">
                                <span class="material-symbols-outlined text-sm">info</span>
                            </button>
                        </div>
                    </div>
                    <h3 class="font-headline font-bold text-on-surface group-hover:text-primary transition-colors line-clamp-2" th:text="${item.name}"></h3>
                    <div class="flex items-center gap-3 mt-1 text-xs text-on-surface-variant">
                        <span th:if="${item.views != null}" class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">visibility</span>
                            <span th:text="${item.views}"></span>
                        </span>
                        <span th:if="${item.pageCount != null}" class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">auto_stories</span>
                            <span th:text="${item.pageCount}"></span>
                        </span>
                        <span th:if="${item.lastViewFormatted != null}" class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">schedule</span>
                            <span th:text="${item.lastViewFormatted}"></span>
                        </span>
                    </div>
                </a>
            </div>
        </div>

        <div th:if="${chapters.empty}" class="text-center py-12">
            <span class="material-symbols-outlined text-on-surface-variant text-6xl mb-4 block">trending_down</span>
            <p class="text-on-surface-variant text-lg">No chapters found</p>
        </div>
    </div>

    <script th:inline="javascript">
        setTheme();
    </script>
</body>
</html>
