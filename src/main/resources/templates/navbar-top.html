<script>
let statusPollInterval = null;

async function updateStatus() {
  try {
    const response = await fetch('/admin/status');
    const status = await response.text();
    const statusLabel = document.getElementById('scan-status');
    const previousStatus = statusLabel.textContent;

    statusLabel.textContent = status;

    // If status changed from non-idle to Idle, refresh the page
    if (previousStatus !== 'Idle' && status === 'Idle') {
      clearInterval(statusPollInterval);
      statusPollInterval = null;
      updateButtonVisibility();
      setTimeout(() => {
        location.reload();
      }, 500);
    } else {
      updateButtonVisibility();
    }
  } catch (err) {
    console.error('Failed to update status:', err);
  }
}

function updateButtonVisibility() {
  const btn = document.getElementById('scan-btn');
  const statusLabel = document.getElementById('scan-status');
  if (statusLabel.textContent === 'Idle') {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
    // Start polling if not already polling and status is not Idle
    if (!statusPollInterval) {
      statusPollInterval = setInterval(updateStatus, 1000);
    }
  }
}

function startScan() {
  const btn = document.getElementById('scan-btn');
  const statusLabel = document.getElementById('scan-status');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  btn.classList.add('hidden');

  fetch('/admin/scanFiles')
    .then(response => {
      // Start polling for status updates every second
      statusPollInterval = setInterval(updateStatus, 1000);
      updateStatus(); // Get initial status immediately
    })
    .catch(err => {
      btn.disabled = false;
      btn.textContent = 'Scan';
      btn.classList.remove('hidden');
      statusLabel.textContent = 'Error';
      console.error(err);
    });
}

// Initialize by fetching current status on page load
window.addEventListener('DOMContentLoaded', async function() {
  await updateStatus();
});
</script>
